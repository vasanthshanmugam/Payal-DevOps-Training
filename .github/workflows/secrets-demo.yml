name: Secrets Demo

on:
    workflow_dispatch:

jobs:
    secrets-showcase:
        runs-on: ubuntu-latest

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Step 1 - Show Secrets
            env:
              API_KEY: ${{ secrets.MY_API_KEY }}
              DATABASE_URL: ${{ secrets.MY_DATABASE_URL }}
            run: |
              echo "API KEY : $API_KEY"
              echo "DATABASE URL : $DATABASE_URL"
